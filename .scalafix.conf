## Scalafix Configuration for repcheck-sbt-plugins
## Enforces Scala code patterns and style for the RepCheck sbt plugins.
##
## Run: sbt "scalafixAll" (auto-fix) or sbt "scalafixAll --check" (CI lint)

rules = [
  OrganizeImports,
  RemoveUnused,
  LeakingImplicitClassVal
]

## Import Organization
OrganizeImports {
  groupedImports = Merge
  groups = [
    "re:javax?\\."
    "scala."
    "sbt."
    "*"
    "com.repcheck."
  ]
  removeUnused = true
  blankLines = Auto
  coalesceToWildcardImportThreshold = null
}

RemoveUnused {
  imports = true
  privates = true
  locals = true
  patternvars = true
}
